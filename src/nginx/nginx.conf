events {
    worker_connections 1024;
}

http {
    upstream event_bus {
        server event-bus:3000;
    }

    upstream payment_service {
        server payment-service:3001;
    }

    upstream portfolio_service {
        server portfolio-service:3002;
    }

    upstream compliance_service {
        server compliance-service:3003;
    }

    upstream notification_service {
        server notification-service:3004;
    }

    upstream collaboration_service {
        server collaboration-service:3005;
    }

    upstream audit_service {
        server audit-service:3006;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Event Bus Service
        location /api/v1/events {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://event_bus;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment Service
        location /api/v1/payments {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Portfolio Service
        location /api/v1/portfolios {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://portfolio_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Compliance Service
        location /api/v1/compliance {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://compliance_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Notification Service
        location /api/v1/notifications {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Collaboration Service
        location /api/v1/collaboration {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://collaboration_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Audit Service
        location /api/v1/audit {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://audit_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Authentication endpoints (more restrictive)
        location /api/v1/auth {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://payment_service; # Auth handled by any service
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Documentation
        location ~ ^/([^/]+)/api-docs {
            set $service $1;
            
            if ($service = "events") {
                proxy_pass http://event_bus/api-docs;
            }
            if ($service = "payments") {
                proxy_pass http://payment_service/api-docs;
            }
            if ($service = "portfolios") {
                proxy_pass http://portfolio_service/api-docs;
            }
            if ($service = "compliance") {
                proxy_pass http://compliance_service/api-docs;
            }
            if ($service = "notifications") {
                proxy_pass http://notification_service/api-docs;
            }
            if ($service = "collaboration") {
                proxy_pass http://collaboration_service/api-docs;
            }
            if ($service = "audit") {
                proxy_pass http://audit_service/api-docs;
            }
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default location
        location / {
            return 404 '{"error": "Not Found"}';
            add_header Content-Type application/json;
        }
    }

    # HTTPS server (if SSL certificates are available)
    # server {
    #     listen 443 ssl http2;
    #     server_name localhost;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # Same location blocks as HTTP server
    # }
}