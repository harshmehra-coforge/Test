version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wealth-postgres
    environment:
      POSTGRES_DB: wealth_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - wealth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: wealth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wealth-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Apache Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: wealth-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - wealth-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: wealth-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - wealth-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Event Bus Service
  event-bus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wealth-event-bus
    environment:
      - SERVICE_NAME=event-bus
      - PORT=3000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/wealth_management
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - wealth-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # Payment Service
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wealth-payment
    environment:
      - SERVICE_NAME=payment
      - PORT=3001
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/wealth_management
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - kafka
      - event-bus
    networks:
      - wealth-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # Portfolio Service
  portfolio-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wealth-portfolio
    environment:
      - SERVICE_NAME=portfolio
      - PORT=3002
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/wealth_management
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis
      - kafka
      - event-bus
    networks:
      - wealth-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # Compliance Service
  compliance-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wealth-compliance
    environment:
      - SERVICE_NAME=compliance
      - PORT=3003
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/wealth_management
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
    ports:
      - "3003:3003"
    depends_on:
      - postgres
      - redis
      - kafka
      - event-bus
    networks:
      - wealth-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wealth-notification
    environment:
      - SERVICE_NAME=notification
      - PORT=3004
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/wealth_management
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
    ports:
      - "3004:3004"
    depends_on:
      - postgres
      - redis
      - kafka
      - event-bus
    networks:
      - wealth-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # Collaboration Hub Service
  collaboration-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wealth-collaboration
    environment:
      - SERVICE_NAME=collaboration
      - PORT=3005
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/wealth_management
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
    ports:
      - "3005:3005"
    depends_on:
      - postgres
      - redis
      - kafka
      - event-bus
    networks:
      - wealth-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # Audit Service
  audit-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wealth-audit
    environment:
      - SERVICE_NAME=audit
      - PORT=3006
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/wealth_management
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:29092
    ports:
      - "3006:3006"
    depends_on:
      - postgres
      - redis
      - kafka
      - event-bus
    networks:
      - wealth-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # Nginx Load Balancer (Optional)
  nginx:
    image: nginx:alpine
    container_name: wealth-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - event-bus
      - payment-service
      - portfolio-service
      - compliance-service
      - notification-service
      - collaboration-service
      - audit-service
    networks:
      - wealth-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  wealth-network:
    driver: bridge