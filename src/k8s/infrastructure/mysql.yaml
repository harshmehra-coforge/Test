apiVersion: v1
kind: Namespace
metadata:
  name: fnol-infrastructure
  labels:
    name: fnol-infrastructure
---
apiVersion: v1
kind: Namespace
metadata:
  name: fnol-production
  labels:
    name: fnol-production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: fnol-infrastructure
data:
  my.cnf: |
    [mysqld]
    default-authentication-plugin=mysql_native_password
    bind-address=0.0.0.0
    max_connections=200
    innodb_buffer_pool_size=1G
    innodb_log_file_size=256M
    slow_query_log=1
    long_query_time=2
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: fnol-infrastructure
type: Opaque
data:
  mysql-root-password: cm9vdHBhc3N3b3Jk # rootpassword
  mysql-user: Zm5vbF91c2Vy # fnol_user
  mysql-password: Zm5vbF9wYXNzd29yZA== # fnol_password
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: fnol-infrastructure
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:9.4.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-root-password
        - name: MYSQL_DATABASE
          value: fnol_db
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-password
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        - name: mysql-config
          mountPath: /etc/mysql/conf.d
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 5
          periodSeconds: 2
          timeoutSeconds: 1
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
      volumes:
      - name: mysql-config
        configMap:
          name: mysql-config
  volumeClaimTemplates:
  - metadata:
      name: mysql-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: fnol-infrastructure
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  clusterIP: None